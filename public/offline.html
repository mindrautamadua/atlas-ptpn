<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <title>Offline · ATLAS</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #c9ced8;
      }
      .card {
        max-width: 380px;
        text-align: center;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 22px;
        display: grid;
        place-items: center;
        background: #16a34a;
        border-radius: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #f1f5f9;
      }
      p {
        margin: 0 0 24px;
        font-size: 14px;
        line-height: 1.6;
        color: #7c8493;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 11px 22px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #16a34a;
        transition: filter 0.15s ease;
      }
      button:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2.5" y1="18.5" x2="10" y2="2.5" />
          <line x1="17.5" y1="18.5" x2="10" y2="2.5" />
          <line x1="6.3" y1="11.5" x2="13.7" y2="11.5" />
        </svg>
      </div>
      <h1>Anda sedang offline</h1>
      <p>
        Koneksi internet terputus. ATLAS membutuhkan jaringan untuk memuat
        data terbaru. Periksa koneksi Anda lalu coba lagi.
      </p>
      <button onclick="location.reload()">Coba lagi</button>
    </div>
  </body>
</html>
